
version: '3.9'
services:
  db:
    build: ./database
    container_name: coffee_db
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: coffeeshop
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: ./backend
    container_name: coffee_backend
    depends_on:
      - db
    environment:
      DB_HOST: db
      DB_USER: postgres
      DB_PASS: postgres
      DB_NAME: coffeeshop
      PORT: 4000
    ports:
      - "4000:4000"

  frontend:
    build: ./frontend
    container_name: coffee_frontend
    depends_on:
      - backend
    environment:
      VITE_API_URL: "http://localhost:4000"
    ports:
      - "3000:80"

volumes:
  pgdata:
